name: CI/CD Pipeline - Build and Push Docker Images

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # DEBUG: Check if secrets exist (without exposing values)
      - name: Debug secrets
        run: |
          echo "Checking secrets..."
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "✅ DOCKER_USERNAME secret is SET"
            echo "Username: ${{ secrets.DOCKER_USERNAME }}"
          else
            echo "❌ DOCKER_USERNAME secret is NOT SET"
          fi
          
          if [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "✅ DOCKER_PASSWORD secret is SET"
            echo "Password length: $(echo -n '${{ secrets.DOCKER_PASSWORD }}' | wc -c) characters"
          else
            echo "❌ DOCKER_PASSWORD secret is NOT SET"
          fi
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      
      - name: Build User Service JAR
        run: |
          cd user-service
          mvn clean package -DskipTests
      
      - name: Build Experience Service JAR
        run: |
          cd experience-service
          mvn clean package -DskipTests
      
      - name: Build Notification Service JAR
        run: |
          cd notification-service
          mvn clean package -DskipTests
      
      - name: Build API Gateway JAR
        run: |
          cd api-gatway
          mvn clean package -DskipTests
      
      - name: Build Discovery Service JAR
        run: |
          cd discovery-service
          mvn clean package -DskipTests
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/placement-user-service:latest
      
      - name: Build and push Experience Service
        uses: docker/build-push-action@v5
        with:
          context: ./experience-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/placement-experience-service:latest
      
      - name: Build and push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/placement-notification-service:latest
      
      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gatway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/placement-api-gateway:latest
      
      - name: Build and push Discovery Service
        uses: docker/build-push-action@v5
        with:
          context: ./discovery-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/placement-discovery-service:latest
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/placement-frontend:latest
      
      - name: Verify pushed images
        run: |
          echo "✅ All images built and pushed successfully!"
